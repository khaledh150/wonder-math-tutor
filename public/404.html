<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wonder Kids Math</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s back to index.html so React handles routing
    var pathSegmentsToKeep = 1; // keep /wonder-math-tutor/ prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
    );
  </script>
</head>
<body></body>
</html>
